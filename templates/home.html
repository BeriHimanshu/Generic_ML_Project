<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            width:700px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#4facfe;
        }

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#0077ff;
        }

        .result{
            margin-top:25px;
            text-align:center;
            background:#f5f5f5;
            padding:18px;
            border-radius:10px;
        }

        .result h2{
            color:#0077ff;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 Student Exam Performance Predictor</h1>

    <p>Predict a student's Mathematics score using Machine Learning.</p>

    <form action="{{ url_for('predict_datapoint') }}" method="POST">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option selected disabled>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Race / Ethnicity</label>
            <select name="ethnicity" required>
                <option selected disabled>Select Group</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education" required>
                <option selected disabled>Select Education</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="master's degree">Master's Degree</option>
                <option value="high school">High School</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lunch Type</label>
            <select name="lunch" required>
                <option selected disabled>Select Lunch</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free / Reduced</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test Preparation Course</label>
            <select name="test_preparation_course" required>
                <option selected disabled>Select Course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Reading Score</label>
            <input type="number"
                   name="reading_score"
                   placeholder="Enter Reading Score"
                   min="0"
                   max="100"
                   required>
        </div>

        <div class="form-group">
            <label>Writing Score</label>
            <input type="number"
                   name="writing_score"
                   placeholder="Enter Writing Score"
                   min="0"
                   max="100"
                   required>
        </div>

        <button class="btn" type="submit">
            Predict Mathematics Score
        </button>

    </form>

    {% if results %}
    <div class="result">
        <h3>🎯 Predicted Mathematics Score</h3>
        <h2>{{ results }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
