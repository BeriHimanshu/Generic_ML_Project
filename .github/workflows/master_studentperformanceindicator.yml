# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - StudentPerformanceIndicator

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: studentperformanceindicator.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_88B51196E51A401DB8E0F9FF58BD5191 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_DA4D57FB9E4E42DAA43BE2BE61CC280A }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: studentperformanceindicator.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_88B51196E51A401DB8E0F9FF58BD5191 }}/studentperformance:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_020EF954CD6E4D16893EF1C1AF2C7F94 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_71FFC14E92B44B8F964276A6D4DE95D9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D7B8F3524CBB4299A5DFEF5329BFF254 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'StudentPerformanceIndicator'
          slot-name: 'Production'
          images: 'studentperformanceindicator.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_88B51196E51A401DB8E0F9FF58BD5191 }}/studentperformance:${{ github.sha }}'
          